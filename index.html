<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acatonics Jeopardy</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(160deg, #060b2a 0%, #0a1640 60%, #0f1f5c 100%);
      min-height: 100vh;
      font-family: 'Georgia', 'Times New Roman', serif;
      color: #fff;
    }
    button { font-family: 'Georgia', 'Times New Roman', serif; }
    input  { font-family: 'Georgia', 'Times New Roman', serif; }
    /* hover effect on value cells */
    .val-cell:hover { filter: brightness(1.25); transform: scale(1.03); }
    .val-cell { transition: filter 0.15s, transform 0.15s; }
    /* score btn hover */
    .score-btn:hover { opacity: 0.85; }
    /* show-btn hover */
    .show-btn:hover { filter: brightness(1.1); }
    /* close-btn hover */
    .close-btn:hover { border-color: #8899cc; color: #ccd8ff; }
    /* team-count-btn hover */
    .tcount-btn:hover { filter: brightness(1.15); }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const CATEGORIES = [
      "INSIDE JOKES",
      "TYPOS & SPELLING",
      "THE SET",
      "BIRTHDAYS",
      "THE COMPETITION",
      "LORE & NICKNAMES",
    ];

    const VALUES = [200, 400, 600, 800, 1000];

    const QUESTIONS = {
      "INSIDE JOKES": [
        {
          clue: "Luca's legendary typo of the word "stop" — instantly adopted by the whole group.",
          answer: "STIP",
        },
        {
          clue: "Isa's nickname for Nicole, formed by swapping the first syllable.",
          answer: "Jocole",
        },
        {
          clue: "This addictive mobile game made a comeback on every aca trip.",
          answer: "Blick Block",
        },
        {
          clue: "Ivan horrified the group by doing THIS to his kiwis.",
          answer: "Eating them with the skin on",
        },
        {
          clue: "Benny's elderly relative unknowingly gifted him an item featuring this inappropriate acronym.",
          answer: "MILF",
        },
      ],
      "TYPOS & SPELLING": [
        {
          clue: 'Nicole\'s autocorrect rendered the word "shopping" as this.',
          answer: "Dhoppibg",
        },
        {
          clue: "Nura was CERTAIN this was the correct spelling of the chicken restaurant's name.",
          answer: "Raisin Canes (for Raising Cane's)",
        },
        {
          clue: 'Nura typed this word when she meant "rumor," instantly cementing it as lore.',
          answer: "Trumor",
        },
        {
          clue: 'Ashlyn thanked Luca with this word instead of "thanks."',
          answer: "Fhanjs",
        },
        {
          clue: "Nura boasted about taking 5 years of this subject — then misspelled it in the very same message.",
          answer: 'Spanish (typed "spainish")',
        },
      ],
      "THE SET": [
        {
          clue: "This Latin choral piece served as the group's ominous competition opener.",
          answer: "Crucifixus",
        },
        {
          clue: "Nicole's solo song in the competition set.",
          answer: "Vampire",
        },
        {
          clue: "Wilson suggested cutting this song because it didn't fit the dark, vampirey theme.",
          answer: "In My Blood",
        },
        {
          clue: "This external arranger worked with Schwartz to shape the Acatonics' competition set.",
          answer: "Wilson",
        },
        {
          clue: 'Wilson suggested adding this "chant-like" song from the movie Sinner as a replacement.',
          answer: "Wicked Ones",
        },
      ],
      "BIRTHDAYS": [
        {
          clue: "Her birthday falls on September 19th — the same day as a major performance.",
          answer: "Nura",
        },
        {
          clue: "His birthday was celebrated at midnight by the whole group during the Boston trip.",
          answer: "Ray",
        },
        {
          clue: "She turned 18 on November 5th, with Ryan literally counting down the seconds to text first.",
          answer: "Megan",
        },
        {
          clue: "The group was genuinely unsure if THIS person's September 14th birthday was real or just a troll.",
          answer: "Kenny",
        },
        {
          clue: "The first big birthday celebrated in the group chat, on July 16th.",
          answer: "Mona",
        },
      ],
      "THE COMPETITION": [
        {
          clue: "The city where the Acatonics won their ICHSA Quarterfinal.",
          answer: "Boston",
        },
        {
          clue: "The group that finished second to the Acatonics at the Boston Quarterfinal.",
          answer: "Sol",
        },
        {
          clue: 'This Boston judge called the Acatonics "moody babies" and said their choreo was "so camp."',
          answer: "Christopher (from Baltimore)",
        },
        {
          clue: "Despite receiving a 5/10 on soloist interpretation, the group received THIS award nomination.",
          answer: "Best Soloist nomination",
        },
        {
          clue: "The date of the Acatonics' ICHSA Semifinals.",
          answer: "March 28, 2026",
        },
      ],
      "LORE & NICKNAMES": [
        {
          clue: "Ray and Claire share this family relationship.",
          answer: "They are siblings (brother & sister)",
        },
        {
          clue: "Nura intentionally leaped into THIS while trying to jump between logs with a friend.",
          answer: "A creek / body of water",
        },
        {
          clue: "Ivan's beloved food-based nickname, earned by his legendary appetite.",
          answer: "BBI Mega Mac",
        },
        {
          clue: "In Mona and Nura's Hunger Games draft, Isa and Ahmed were assigned to this district.",
          answer: "District 11 (Agriculture)",
        },
        {
          clue: "This teacher was allegedly escorted from Wootton after accidentally screen-sharing adult content on the classroom Promethean board.",
          answer: "Ticona",
        },
      ],
    };

    const TEAM_COLORS = ["#FFD700", "#00C9FF", "#FF6B9D", "#7CFF6B"];
    const DEFAULT_NAMES = ["Team 1", "Team 2", "Team 3", "Team 4"];

    function App() {
      const [used, setUsed]           = useState({});
      const [active, setActive]       = useState(null);  // { cat, val, key }
      const [showAns, setShowAns]     = useState(false);
      const [scores, setScores]       = useState([0, 0, 0, 0]);
      const [names, setNames]         = useState(DEFAULT_NAMES);
      const [editIdx, setEditIdx]     = useState(null);
      const [editVal, setEditVal]     = useState("");
      const [numTeams, setNumTeams]   = useState(2);

      const openCell = (cat, val) => {
        const key = `${cat}||${val}`;
        if (used[key]) return;
        setActive({ cat, val, key });
        setShowAns(false);
      };

      const closeModal = () => {
        if (active) setUsed(prev => ({ ...prev, [active.key]: true }));
        setActive(null);
        setShowAns(false);
      };

      const adjust = (i, dir) => {
        if (!active) return;
        setScores(prev => {
          const next = [...prev];
          next[i] += dir * active.val;
          return next;
        });
      };

      const commitName = (i) => {
        if (editVal.trim()) {
          setNames(prev => { const n=[...prev]; n[i]=editVal.trim(); return n; });
        }
        setEditIdx(null);
      };

      const q = active
        ? QUESTIONS[active.cat][VALUES.indexOf(active.val)]
        : null;

      // ── Board ───────────────────────────────────────────────────────────────
      const boardStyle = {
        display: "grid",
        gridTemplateColumns: `repeat(${CATEGORIES.length}, 1fr)`,
        gap: "5px",
        width: "100%",
        maxWidth: "1000px",
        margin: "0 auto 28px",
        padding: "0 8px",
      };

      return (
        <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", padding:"24px 8px 48px" }}>

          {/* ── Title ── */}
          <div style={{ display:"flex", alignItems:"center", gap:"14px", marginBottom:"22px" }}>
            <span style={{ color:"#FFD700", fontSize:"2rem", textShadow:"0 0 12px #FFD700" }}>★</span>
            <h1 style={{
              fontSize:"clamp(1.3rem,4vw,2.5rem)",
              fontWeight:"bold",
              letterSpacing:"0.12em",
              color:"#FFD700",
              textShadow:"0 2px 18px rgba(255,215,0,.55)",
              margin:0,
              textAlign:"center",
            }}>ACATONICS JEOPARDY</h1>
            <span style={{ color:"#FFD700", fontSize:"2rem", textShadow:"0 0 12px #FFD700" }}>★</span>
          </div>

          {/* ── Board ── */}
          <div style={boardStyle}>
            {/* Category headers */}
            {CATEGORIES.map(cat => (
              <div key={cat} style={{
                background:"linear-gradient(180deg,#1a2e6e,#0d1b4e)",
                border:"2px solid #2a4ab0",
                borderRadius:"6px",
                padding:"10px 6px",
                textAlign:"center",
                fontWeight:"bold",
                fontSize:"clamp(0.5rem,1.2vw,0.8rem)",
                letterSpacing:"0.05em",
                textTransform:"uppercase",
                color:"#c8d8ff",
                minHeight:"65px",
                display:"flex",
                alignItems:"center",
                justifyContent:"center",
              }}>
                {cat}
              </div>
            ))}

            {/* Value cells */}
            {VALUES.map(val =>
              CATEGORIES.map(cat => {
                const key  = `${cat}||${val}`;
                const gone = !!used[key];
                return (
                  <div
                    key={key}
                    className={gone ? "" : "val-cell"}
                    onClick={() => openCell(cat, val)}
                    style={{
                      background: gone
                        ? "linear-gradient(180deg,#0a1640,#060b2a)"
                        : "linear-gradient(180deg,#1640a8,#0d2980)",
                      border: gone ? "2px solid #1a2e5a" : "2px solid #2a5ae0",
                      borderRadius:"6px",
                      minHeight:"65px",
                      display:"flex",
                      alignItems:"center",
                      justifyContent:"center",
                      cursor: gone ? "default" : "pointer",
                      boxShadow: gone ? "none" : "0 2px 8px rgba(0,0,0,.4)",
                    }}
                  >
                    {gone
                      ? <span style={{ opacity:0.15, fontSize:"1.2rem" }}>✓</span>
                      : <span style={{
                          fontSize:"clamp(1rem,2.5vw,1.9rem)",
                          fontWeight:"bold",
                          color:"#FFD700",
                          textShadow:"0 0 10px rgba(255,215,0,.6),0 2px 4px rgba(0,0,0,.8)",
                        }}>${val}</span>
                    }
                  </div>
                );
              })
            )}
          </div>

          {/* ── Scoreboard ── */}
          <div style={{
            width:"100%",
            maxWidth:"1000px",
            background:"rgba(10,20,60,.7)",
            border:"2px solid #2a4ab0",
            borderRadius:"12px",
            padding:"16px 20px",
            margin:"0 8px",
          }}>
            <div style={{ textAlign:"center", fontSize:"0.8rem", letterSpacing:"0.16em", color:"#c8d8ff", marginBottom:"12px", textTransform:"uppercase", fontWeight:"bold" }}>
              Scoreboard
            </div>

            <div style={{ display:"flex", gap:"10px", justifyContent:"center", flexWrap:"wrap" }}>
              {scores.slice(0, numTeams).map((score, i) => (
                <div key={i} style={{
                  background:"rgba(20,30,80,.8)",
                  border:`2px solid ${TEAM_COLORS[i]}`,
                  borderRadius:"10px",
                  padding:"12px 14px",
                  minWidth:"130px",
                  flex:"1",
                  maxWidth:"200px",
                  textAlign:"center",
                }}>
                  {editIdx === i
                    ? <input
                        autoFocus
                        value={editVal}
                        onChange={e => setEditVal(e.target.value)}
                        onBlur={() => commitName(i)}
                        onKeyDown={e => { if(e.key==="Enter") commitName(i); }}
                        style={{
                          background:"rgba(255,255,255,.1)",
                          border:`1px solid ${TEAM_COLORS[i]}`,
                          borderRadius:"4px",
                          color:TEAM_COLORS[i],
                          padding:"3px 7px",
                          fontSize:"0.82rem",
                          textAlign:"center",
                          width:"100%",
                          outline:"none",
                        }}
                      />
                    : <div
                        onClick={() => { setEditIdx(i); setEditVal(names[i]); }}
                        title="Click to rename"
                        style={{ fontWeight:"bold", fontSize:"0.82rem", color:TEAM_COLORS[i], marginBottom:"4px", cursor:"pointer", letterSpacing:"0.04em" }}
                      >
                        {names[i]} ✏️
                      </div>
                  }

                  <div style={{ fontSize:"1.75rem", fontWeight:"bold", color:"#fff", margin:"5px 0", fontVariantNumeric:"tabular-nums" }}>
                    ${score.toLocaleString()}
                  </div>

                  <div style={{ display:"flex", gap:"7px", justifyContent:"center", marginTop:"5px" }}>
                    <button
                      className="score-btn"
                      onClick={() => adjust(i, 1)}
                      title="Award points"
                      style={{ background:"#1a6e2e", border:"none", borderRadius:"6px", color:"#fff", fontSize:"1.15rem", fontWeight:"bold", width:"34px", height:"34px", cursor:"pointer" }}
                    >+</button>
                    <button
                      className="score-btn"
                      onClick={() => adjust(i, -1)}
                      title="Deduct points"
                      style={{ background:"#8b1a1a", border:"none", borderRadius:"6px", color:"#fff", fontSize:"1.15rem", fontWeight:"bold", width:"34px", height:"34px", cursor:"pointer" }}
                    >−</button>
                  </div>
                </div>
              ))}
            </div>

            {/* Team count toggle */}
            <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:"8px", marginTop:"14px" }}>
              <span style={{ color:"#8899cc", fontSize:"0.78rem", letterSpacing:"0.06em", textTransform:"uppercase" }}>Teams:</span>
              {[2,3,4].map(n => (
                <button
                  key={n}
                  className="tcount-btn"
                  onClick={() => setNumTeams(n)}
                  style={{
                    border:"2px solid #FFD700",
                    borderRadius:"6px",
                    padding:"4px 11px",
                    cursor:"pointer",
                    fontWeight:"bold",
                    fontSize:"0.82rem",
                    background: numTeams===n ? "#FFD700" : "#1a2e5a",
                    color:        numTeams===n ? "#0a0e2a" : "#FFD700",
                    transition:"all 0.15s",
                  }}
                >
                  {n}
                </button>
              ))}
            </div>
          </div>

          {/* ── Modal ── */}
          {active && q && (
            <div
              onClick={closeModal}
              style={{
                position:"fixed", inset:0,
                background:"rgba(0,0,0,.87)",
                display:"flex", alignItems:"center", justifyContent:"center",
                zIndex:999, padding:"16px",
              }}
            >
              <div
                onClick={e => e.stopPropagation()}
                style={{
                  background:"linear-gradient(160deg,#0d2080,#060b3a)",
                  border:"3px solid #FFD700",
                  borderRadius:"16px",
                  padding:"36px 40px",
                  maxWidth:"600px",
                  width:"100%",
                  textAlign:"center",
                  boxShadow:"0 0 60px rgba(255,215,0,.28),0 20px 60px rgba(0,0,0,.8)",
                }}
              >
                <div style={{ fontSize:"0.75rem", letterSpacing:"0.2em", color:"#8899cc", textTransform:"uppercase", marginBottom:"8px" }}>
                  {active.cat}
                </div>
                <div style={{ fontSize:"2.4rem", fontWeight:"bold", color:"#FFD700", textShadow:"0 0 20px rgba(255,215,0,.65)", marginBottom:"22px" }}>
                  ${active.val}
                </div>
                <div style={{ fontSize:"clamp(1rem,2.5vw,1.25rem)", lineHeight:"1.65", color:"#dde8ff", marginBottom:"26px", fontStyle:"italic" }}>
                  {q.clue}
                </div>

                {showAns
                  ? <>
                      <div style={{
                        fontSize:"clamp(1.1rem,2.5vw,1.5rem)",
                        fontWeight:"bold",
                        color:"#FFD700",
                        background:"rgba(255,215,0,.1)",
                        border:"2px solid rgba(255,215,0,.4)",
                        borderRadius:"10px",
                        padding:"15px 22px",
                        marginBottom:"18px",
                        textShadow:"0 0 12px rgba(255,215,0,.35)",
                      }}>
                        {q.answer}
                      </div>
                      <p style={{ color:"#6688bb", fontSize:"0.78rem", fontStyle:"italic", marginBottom:"18px" }}>
                        Use + / − on the scoreboard to award points!
                      </p>
                    </>
                  : <button
                      className="show-btn"
                      onClick={() => setShowAns(true)}
                      style={{
                        background:"linear-gradient(135deg,#FFD700,#e6a800)",
                        border:"none",
                        borderRadius:"10px",
                        padding:"13px 30px",
                        fontSize:"0.95rem",
                        fontWeight:"bold",
                        color:"#0a0e2a",
                        cursor:"pointer",
                        letterSpacing:"0.06em",
                        textTransform:"uppercase",
                        marginBottom:"18px",
                        boxShadow:"0 4px 20px rgba(255,215,0,.38)",
                        display:"block",
                        margin:"0 auto 18px",
                      }}
                    >
                      Reveal Answer
                    </button>
                }

                <button
                  className="close-btn"
                  onClick={closeModal}
                  style={{
                    background:"transparent",
                    border:"2px solid #4a6aaa",
                    borderRadius:"8px",
                    padding:"9px 22px",
                    color:"#8899cc",
                    fontSize:"0.82rem",
                    cursor:"pointer",
                    display:"block",
                    margin:"0 auto",
                    letterSpacing:"0.04em",
                  }}
                >
                  ✕ Close &amp; Mark Used
                </button>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

</body>
</html>
